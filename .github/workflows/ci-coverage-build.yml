name: Coverage Build
on:
  workflow_dispatch:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: coverage build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    env:
      ROS_DISTRO: rolling
      # Rolling officially moved to target Ubuntu 26.04 (resolute) on
      # 2026-04-28, so rosdep against ros/rosdistro master no longer resolves
      # rolling keys on noble. Pin to the last snapshot that supports noble,
      # mirroring the same workaround industrial_ci uses for the binary builds
      # (https://github.com/ros-industrial/industrial_ci/pull/933).
      ROSDISTRO_INDEX_VERSION: rolling/2026-04-28
    steps:
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ env.ROS_DISTRO }}
      - name: Install ROS deps with upstream packaging gaps
        # joint_limits is a runtime dep of hardware_interface that is not
        # declared in ros-rolling-hardware-interface's debian Depends.
        # rosidl-typesupport-fastrtps-{c,cpp} are typesupport implementations
        # that ros-rolling-rosidl-typesupport-c (the dispatch package) does not
        # pull in.
        run: |
          sudo apt-get install -y \
            ros-${{ env.ROS_DISTRO }}-rosidl-typesupport-fastrtps-c \
            ros-${{ env.ROS_DISTRO }}-rosidl-typesupport-fastrtps-cpp \
            ros-${{ env.ROS_DISTRO }}-joint-limits
      - uses: actions/checkout@v4
      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: ${{ env.ROS_DISTRO }}
          import-token: ${{ secrets.GITHUB_TOKEN }}
          # build all packages listed in the meta package
          package-name:
            robotiq_driver
            robotiq_controllers
            robotiq_description

          vcs-repo-file-url: |
            https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/ros2_robotiq_gripper-not-released.${{ env.ROS_DISTRO }}.repos
          colcon-defaults: |
            {
              "build": {
                "mixin": ["coverage-gcc"]
              }
            }
          colcon-mixin-repository: https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml
      - name: Debug runtime library resolution
        if: always()
        run: |
          echo "=== LD_LIBRARY_PATH ==="
          echo "${LD_LIBRARY_PATH:-(unset)}"
          echo
          echo "=== /opt/ros/${ROS_DISTRO}/lib (filtered) ==="
          ls /opt/ros/${ROS_DISTRO}/lib | grep -E "hardware_interface|joint_(saturation_)?limit" || true
          echo
          echo "=== Test binary RPATHs ==="
          for bin in ros_ws/build/robotiq_driver/tests/test_*; do
            if [ -x "$bin" ]; then
              echo "--- $bin ---"
              readelf -d "$bin" | grep -E "RPATH|RUNPATH|NEEDED" || true
            fi
          done
      - uses: codecov/codecov-action@v4
        with:
          file: ros_ws/lcov/total_coverage.info
          flags: unittests
          name: codecov-umbrella
      - uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-coverage-rolling
          path: ros_ws/log
