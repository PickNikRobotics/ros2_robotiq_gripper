name: Coverage Build
on:
  workflow_dispatch:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: coverage build
    runs-on: ubuntu-24.04
    container: rostooling/setup-ros-docker:ubuntu-noble-ros-rolling-ros-base-latest
    strategy:
      fail-fast: false
    env:
      ROS_DISTRO: rolling
    steps:
      - name: Install ros2_control packages not preinstalled in ros-base
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-${{ env.ROS_DISTRO }}-controller-interface \
            ros-${{ env.ROS_DISTRO }}-hardware-interface \
            ros-${{ env.ROS_DISTRO }}-joint-limits \
            ros-${{ env.ROS_DISTRO }}-parallel-gripper-controller
      - uses: actions/checkout@v4
      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: ${{ env.ROS_DISTRO }}
          import-token: ${{ secrets.GITHUB_TOKEN }}
          # build all packages listed in the meta package
          package-name:
            robotiq_driver
            robotiq_controllers
            robotiq_description

          vcs-repo-file-url: |
            https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/ros2_robotiq_gripper-not-released.${{ env.ROS_DISTRO }}.repos
          colcon-defaults: |
            {
              "build": {
                "mixin": ["coverage-gcc"]
              }
            }
          colcon-mixin-repository: https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml
      - name: Debug runtime library resolution
        if: always()
        run: |
          echo "=== LD_LIBRARY_PATH ==="
          echo "${LD_LIBRARY_PATH:-(unset)}"
          echo
          echo "=== /opt/ros/${ROS_DISTRO}/lib (filtered) ==="
          ls /opt/ros/${ROS_DISTRO}/lib | grep -E "hardware_interface|joint_(saturation_)?limit" || true
          echo
          echo "=== Test binary RPATHs ==="
          for bin in ros_ws/build/robotiq_driver/tests/test_*; do
            if [ -x "$bin" ]; then
              echo "--- $bin ---"
              readelf -d "$bin" | grep -E "RPATH|RUNPATH|NEEDED" || true
            fi
          done
      - uses: codecov/codecov-action@v4
        with:
          file: ros_ws/lcov/total_coverage.info
          flags: unittests
          name: codecov-umbrella
      - uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-coverage-rolling
          path: ros_ws/log
